<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #202124;
      background: #fff;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #1f1f1f; color: #e8eaed; }
      .popup-header { border-color: #3c4043; }
      .popup-item:hover { background: rgba(255,255,255,0.06); }
      .popup-toggle-track { background: #3c4043; }
    }
    .popup-header {
      padding: 16px;
      text-align: center;
      border-bottom: 1px solid #e8eaed;
    }
    .popup-logo {
      font-size: 20px;
      font-weight: 300;
      background: linear-gradient(135deg, #4285f4, #ea4335, #fbbc04, #34a853);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .popup-body { padding: 8px; }
    .popup-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.15s;
    }
    .popup-item:hover { background: rgba(0,0,0,0.04); }
    .popup-item-label { font-size: 13px; }
    .popup-toggle-track {
      width: 36px;
      height: 20px;
      background: #e8eaed;
      border-radius: 10px;
      position: relative;
      transition: background-color 0.2s;
      cursor: pointer;
    }
    .popup-toggle-track.active {
      background: #4285f4;
    }
    .popup-toggle-thumb {
      width: 16px;
      height: 16px;
      background: white;
      border-radius: 50%;
      position: absolute;
      top: 2px;
      left: 2px;
      transition: transform 0.2s;
      box-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }
    .popup-toggle-track.active .popup-toggle-thumb {
      transform: translateX(16px);
    }
    .popup-link {
      display: block;
      padding: 10px 12px;
      border-radius: 8px;
      text-align: center;
      background: #4285f4;
      color: white;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      margin: 8px;
      transition: background-color 0.15s;
    }
    .popup-link:hover { background: #3367d6; }
  </style>
</head>
<body>
  <div class="popup-header">
    <div class="popup-logo">Swallow</div>
  </div>
  <div class="popup-body">
    <div class="popup-item" id="toggle-bar">
      <span class="popup-item-label">Barre supérieure</span>
      <div class="popup-toggle-track active" id="bar-toggle">
        <div class="popup-toggle-thumb"></div>
      </div>
    </div>
  </div>
  <a href="https://swallow.app/settings" target="_blank" class="popup-link">Paramètres</a>
  <a href="https://swallow.app" target="_blank" class="popup-link" style="background: transparent; color: #4285f4;">Ouvrir Swallow</a>
  <script src="popup.js"></script>
</body>
</html>
